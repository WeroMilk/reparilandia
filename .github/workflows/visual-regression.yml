name: Visual regression

on:
  pull_request:
    paths:
      - 'repariland-next/**'
  workflow_dispatch:

jobs:
  playwright:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: repariland-next
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: repariland-next/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run visual tests
        run: npm run test:visual -- --project=laptop
        env:
          CI: true
      - name: Upload diff artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            repariland-next/playwright-report/
            repariland-next/test-results/
